name: phd_personal
description: PHD Personal - Gestão para Personal Trainers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Backend
  supabase_flutter: ">=2.3.4 <2.7.0"

  # Notifications
  flutter_local_notifications: ^17.0.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  image_picker: ^1.0.7
  file_picker: ^8.0.7

  # Utils
  http: ^1.2.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  mask_text_input_formatter: ^2.9.0
  google_fonts: ^6.1.0
  timezone: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_white.png"
  background_color: "#000000"
  remove_alpha_ios: true
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/logo_white.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/logo_white.png"
    background_color: "#000000"
    theme_color: "#000000"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
